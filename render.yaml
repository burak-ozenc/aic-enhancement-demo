services:
  - type: web
    name: aic-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server -b 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: AIC_SDK_LICENSE
        sync: false   # set manually in Render dashboard — never committed to repo